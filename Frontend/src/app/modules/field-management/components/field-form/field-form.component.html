<form (ngSubmit)="onSubmit()" class="p-4 bg-white rounded shadow-md" style="max-width: 600px;">
  <div class="grid grid-cols-2 gap-4">

    <mat-form-field appearance="fill">
      <mat-label>Field Name</mat-label>
      <input matInput [(ngModel)]="field.name" name="name" required />
      <mat-error *ngIf="!field.name">Field Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Size (Acre)</mat-label>
      <input matInput type="number" [(ngModel)]="field.size" name="size" required min="0" />
      <mat-error *ngIf="field.size < 0">Size must be positive</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Location</mat-label>
      <input matInput [(ngModel)]="field.location" name="location" />
    </mat-form-field>

    <!-- Soil Type Radio Buttons -->
    <div class="col-span-2">
      <label class="block font-medium mb-1">Soil Type</label>
      <mat-radio-group [(ngModel)]="field.soilType" name="soilType" class="flex gap-4">
        <mat-radio-button value="Clay">Clay</mat-radio-button>
        <mat-radio-button value="Sandy">Sandy</mat-radio-button>
        <mat-radio-button value="Loamy">Loamy</mat-radio-button>
      </mat-radio-group>
    </div>

    <!-- Crop Type Radio Buttons -->
    <div class="col-span-2">
      <label class="block font-medium mb-1">Crop Type</label>
      <mat-radio-group [(ngModel)]="field.cropType" name="cropType" class="flex gap-4">
        <mat-radio-button value="Tea">Tea</mat-radio-button>
        <mat-radio-button value="Coconut">Coconut</mat-radio-button>

      </mat-radio-group>
    </div>

    <!-- Status Select -->
    <mat-form-field appearance="fill">
      <mat-label>Status</mat-label>
      <mat-select [(ngModel)]="field.status" name="status">
        <mat-option value="Active">Active</mat-option>
        <mat-option value="Inactive">Inactive</mat-option>
        <mat-option value="Planted">Planted</mat-option>
        <mat-option value="Harvested">Harvested</mat-option>
      </mat-select>
    </mat-form-field>

  </div>

  <div class="mt-4 flex gap-2">
    <button mat-raised-button color="primary" type="submit">Save</button>
    <button mat-button type="button" (click)="cancel.emit()">Cancel</button>
  </div>
</form>
