<form (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-md shadow-md space-y-6 w-full">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <input
      [(ngModel)]="localField.name"
      name="name"
      placeholder="Field Name"
      required
      class="input w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Field Name"
    />
    <input
      [(ngModel)]="localField.size"
      name="size"
      placeholder="Size"
      required
      class="input w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Size"
    />
    <input
      [(ngModel)]="localField.location"
      name="location"
      placeholder="Location"
      required
      class="input w-full col-span-1 md:col-span-2 border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Location (latitude, longitude)"
    />
    <input
      [(ngModel)]="localField.soilType"
      name="soilType"
      placeholder="Soil Type"
      class="input w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Soil Type"
    />
    <input
      [(ngModel)]="localField.cropType"
      name="cropType"
      placeholder="Crop Type"
      class="input w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Crop Type"
    />
    <select
      [(ngModel)]="localField.status"
      name="status"
      class="input w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      aria-label="Status"
      required
    >
      <option value="" disabled>Select Status</option>
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
  </div>
  <div class="flex justify-end space-x-4">
    <button
      type="button"
      (click)="cancel.emit()"
      class="btn bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md"
    >
      Cancel
    </button>
    <button
      type="submit"
      class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
    >
      Save
    </button>
  </div>
</form>
