<!-- Header -->
<div class="flex justify-between mb-2 mt-4">
  <h1 class="text-foreground font-semibold">Field List</h1>
  <button
    (click)="onAddField()"
    class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
  >
    Add Field
  </button>
</div>

<!-- Table -->
<div class=" rounded mt-4">
  <table mat-table [dataSource]="dataSource" class="w-full">

    <!-- Columns -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let field">{{ field.name }}</td>
    </ng-container>

    <ng-container matColumnDef="size">
      <th mat-header-cell *matHeaderCellDef>Size</th>
      <td mat-cell *matCellDef="let field">{{ field.size }}</td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let field">{{ field.location }}</td>
    </ng-container>

    <ng-container matColumnDef="soilType">
      <th mat-header-cell *matHeaderCellDef>Soil Type</th>
      <td mat-cell *matCellDef="let field">{{ field.soilType }}</td>
    </ng-container>

    <ng-container matColumnDef="cropType">
      <th mat-header-cell *matHeaderCellDef>Crop Type</th>
      <td mat-cell *matCellDef="let field">{{ field.cropType }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let field">{{ field.status }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let field">
        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="More actions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="onEditField(field.id)">
            <mat-icon>edit</mat-icon>
            <span>Edit</span>
          </button>
          <button mat-menu-item (click)="onDeleteField(field.id)">
            <mat-icon>delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <!-- Table rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr *ngIf="dataSource.data.length === 0">
      <td colspan="7" class="text-center p-4 text-gray-500">No fields found.</td>
    </tr>
  </table>
</div>

<!-- Field Form Popup -->
<div
  *ngIf="showFieldForm"
  class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-white rounded-lg shadow-lg max-w-2xl w-full p-6 z-50 border border-gray-300"
>
  <button
    class="absolute top-2 right-3 text-gray-600 hover:text-gray-900 text-2xl font-bold"
    (click)="closeFieldForm()"
    aria-label="Close popup"
  >
    &times;
  </button>

  <app-field-form
  [field]="editingField"
  (formClose)="closeFieldForm()"
  (formSubmit)="onFormSubmit($event)"
></app-field-form>
