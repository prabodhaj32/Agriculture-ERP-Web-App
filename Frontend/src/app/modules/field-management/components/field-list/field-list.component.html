<table mat-table [dataSource]="fields" class="mat-elevation-z8 w-full">

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let field"> {{ field.name }} </td>
  </ng-container>

  <!-- Location Column -->
  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef> Location </th>
    <td mat-cell *matCellDef="let field"> {{ field.location }} </td>
  </ng-container>

  <!-- Size Column -->
  <ng-container matColumnDef="size">
    <th mat-header-cell *matHeaderCellDef> Size </th>
    <td mat-cell *matCellDef="let field"> {{ field.size }} </td>
  </ng-container>

  <!-- Soil Type Column -->
  <ng-container matColumnDef="soilType">
    <th mat-header-cell *matHeaderCellDef> Soil </th>
    <td mat-cell *matCellDef="let field"> {{ field.soilType }} </td>
  </ng-container>

  <!-- Crop Type Column -->
  <ng-container matColumnDef="cropType">
    <th mat-header-cell *matHeaderCellDef> Crop </th>
    <td mat-cell *matCellDef="let field"> {{ field.cropType }} </td>
  </ng-container>

  <!-- Status Column -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let field"> {{ field.status }} </td>
  </ng-container>

  <!-- Map Column -->
  <ng-container matColumnDef="map">
    <th mat-header-cell *matHeaderCellDef> Map </th>
    <td mat-cell *matCellDef="let field">
      <button mat-button color="accent" (click)="onViewMap(field)">Map</button>
    </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let field">
      <button mat-icon-button color="primary" (click)="onEdit(field)" aria-label="Edit field">
        <mat-icon>more_vert</mat-icon>
      </button>
    </td>
  </ng-container>

  <!-- Header and Row Definitions -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
