<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold" aria-live="polite">Field Location - {{ name }}</h2>
    <button
      mat-stroked-button
      color="primary"
      (click)="goBack()"
      aria-label="Go back to previous page"
      class="flex items-center gap-1"
    >
      <mat-icon aria-hidden="true">arrow_back</mat-icon>
      Back
    </button>
  </div>

  <div class="border rounded shadow overflow-hidden" style="height: 500px;">
    <div #map id="map" class="h-full w-full"></div>
  </div>
</div>
