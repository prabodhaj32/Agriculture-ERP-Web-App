<div class="p-4">
  <h2 class="text-lg font-bold mb-4">Users</h2>

  <table class="min-w-full text-left text-sm border">
    <thead class="bg-gray-200">
      <tr>
        <th class="px-4 py-2">Name</th>
        <th class="px-4 py-2">Email</th>
        <th class="px-4 py-2">Role</th>
        <th class="px-4 py-2">Status</th>
        <th class="px-4 py-2">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users" class="border-b hover:bg-gray-50 transition">
        <td class="px-4 py-2">{{ user.fullName }}</td>
        <td class="px-4 py-2">{{ user.email }}</td>
        <td class="px-4 py-2 capitalize">{{ user.role }}</td>
        <td class="px-4 py-2">
          <span 
            class="font-medium"
            [ngClass]="user.isActive ? 'text-green-600' : 'text-red-600'"
          >
            {{ user.isActive ? 'Active' : 'Disabled' }}
          </span>
        </td>
        <td class="px-4 py-2 space-x-2">
          <button class="text-blue-500 hover:underline" (click)="editUser(user)">Edit</button>
          <button class="text-yellow-600 hover:underline" (click)="toggleStatus(user)">Toggle</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="mt-6 border-t pt-4">
    <h3 class="text-md font-semibold mb-2">Add / Edit User</h3>
    <!-- Only show form if selectedUser is defined -->
 <app-user-form *ngIf="selectedUser" [user]="selectedUser"></app-user-form>
  </div>
</div>
