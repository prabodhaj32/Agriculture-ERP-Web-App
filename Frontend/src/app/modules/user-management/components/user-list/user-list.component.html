<div class="p-4">
  <h2 class="text-lg font-bold mb-4">Users</h2>

  <table mat-table [dataSource]="users" class="mat-elevation-z8 w-full">

    <!-- Full Name -->
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef> Full Name </th>
      <td mat-cell *matCellDef="let user"> {{ user.fullName }} </td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
    </ng-container>

    <!-- Phone -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef> Phone </th>
      <td mat-cell *matCellDef="let user"> {{ user.phone }} </td>
    </ng-container>

    <!-- Role -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef> Role </th>
      <td mat-cell *matCellDef="let user"> {{ user.role | titlecase }} </td>
    </ng-container>

    <!-- Password -->
    <ng-container matColumnDef="password">
      <th mat-header-cell *matHeaderCellDef> Password </th>
      <td mat-cell *matCellDef="let user">
        {{ '*'.repeat(user.password?.length || 0) }}
      </td>
    </ng-container>

    <!-- Assigned Fields -->
    <ng-container matColumnDef="assignedFields">
      <th mat-header-cell *matHeaderCellDef> Assigned Fields </th>
      <td mat-cell *matCellDef="let user">
        <ng-container *ngIf="user.assignedFields?.length > 0; else noFields">
          {{ user.assignedFields.join(', ') }}
        </ng-container>
        <ng-template #noFields><span class="text-gray-400 italic">None</span></ng-template>
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let user">
        <span [ngClass]="user.isActive ? 'text-green-600 font-medium' : 'text-red-600 font-medium'">
          {{ user.isActive ? 'Active' : 'Disabled' }}
        </span>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let user">
        <button mat-icon-button color="primary" (click)="editUser(user)" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="toggleStatus(user)" matTooltip="Toggle Status">
          <mat-icon>{{ user.isActive ? 'toggle_on' : 'toggle_off' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Table Header & Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- Edit Form -->
  <mat-card class="mt-6" *ngIf="selectedUser">
    <h3 class="text-md font-semibold mb-2">Edit User</h3>
    <app-user-form [user]="selectedUser" (formSubmit)="onUserUpdated()"></app-user-form>
  </mat-card>
</div>
