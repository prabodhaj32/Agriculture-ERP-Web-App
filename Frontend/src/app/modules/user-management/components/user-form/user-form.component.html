<div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md">
  <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="space-y-6" novalidate>

    <div>
      <label for="fullName" class="block mb-1 font-semibold text-gray-700">Full Name</label>
      <input 
        id="fullName" 
        type="text" 
        name="fullName" 
        [(ngModel)]="user.fullName" 
        required 
        placeholder="Enter full name"
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600"
      />
    </div>

    <div>
      <label for="email" class="block mb-1 font-semibold text-gray-700">Email</label>
      <input 
        id="email" 
        type="email" 
        name="email" 
        [(ngModel)]="user.email" 
        required 
        placeholder="Enter email address"
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600"
      />
    </div>

    <div>
      <label for="phone" class="block mb-1 font-semibold text-gray-700">Phone</label>
      <input 
        id="phone" 
        type="text" 
        name="phone" 
        [(ngModel)]="user.phone" 
        required 
        placeholder="Enter phone number"
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600"
      />
    </div>

    <div>
      <label for="role" class="block mb-1 font-semibold text-gray-700">Role</label>
      <select 
        id="role" 
        name="role" 
        [(ngModel)]="user.role" 
        required
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600"
      >
        <option value="Admin">Admin</option>
        <option value="FieldOfficer">Field Officer</option>
        <option value="Manager">Manager</option>
      </select>
    </div>

    <div>
      <label for="password" class="block mb-1 font-semibold text-gray-700">Password</label>
      <input 
        id="password" 
        type="password" 
        name="password" 
        [(ngModel)]="user.password" 
        required 
        placeholder="Enter password"
        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600"
      />
    </div>
<div>
  <label class="block mb-1 font-semibold text-gray-700">Assigned Field</label>
  <div class="flex space-x-6">
    <label class="inline-flex items-center">
      <input 
        type="radio" 
        name="assignedField" 
        [(ngModel)]="assignedField" 
        [ngModelOptions]="{ standalone: true }"
        value="Tea"
        class="form-radio text-green-600"
      />
      <span class="ml-2">Tea</span>
    </label>

    <label class="inline-flex items-center">
      <input 
        type="radio" 
        name="assignedField" 
        [(ngModel)]="assignedField" 
        [ngModelOptions]="{ standalone: true }"
        value="Coconut"
        class="form-radio text-green-600"
      />
      <span class="ml-2">Coconut</span>
    </label>
  </div>
</div>




    <button 
      type="submit" 
      class="w-full bg-green-600 text-white font-semibold py-3 rounded-md hover:bg-green-700 transition-colors disabled:opacity-50"
      [disabled]="userForm.invalid"
    >
      {{ user.id ? 'Update' : 'Create' }} User
    </button>

  </form>
</div>
