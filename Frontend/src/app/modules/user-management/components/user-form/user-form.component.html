<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
  <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="space-y-4">
    <input class="w-full p-2 border rounded" type="text" placeholder="Full Name" [(ngModel)]="user.fullName" name="fullName" required />
    <input class="w-full p-2 border rounded" type="email" placeholder="Email" [(ngModel)]="user.email" name="email" required />
    <input class="w-full p-2 border rounded" type="text" placeholder="Phone" [(ngModel)]="user.phone" name="phone" required />
    <select class="w-full p-2 border rounded" [(ngModel)]="user.role" name="role" required>
      <option value="" disabled selected>Select Role</option>
      <option value="Admin">Admin</option>
      <option value="FieldOfficer">Field Officer</option>
      <option value="Manager">Manager</option>
    </select>
    <input class="w-full p-2 border rounded" type="password" placeholder="Password" [(ngModel)]="user.password" name="password" required />
    <input class="w-full p-2 border rounded" type="text" placeholder="Assigned Fields (comma-separated)" [(ngModel)]="fieldInput" name="fields" />
    
    <button class="bg-green-600 text-white px-4 py-2 rounded" type="submit">
      {{ user.id ? 'Update' : 'Create' }} User
    </button>
  </form>
</div>
