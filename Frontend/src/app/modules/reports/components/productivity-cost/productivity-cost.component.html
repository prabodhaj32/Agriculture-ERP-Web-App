
 <h3 class="text-foreground font-semibold mb-4 mt-6">Productivity & Cost Summary</h3>
<div class="p-6  rounded shadow space-y-6 mt-4">
 

  <!-- Filter Section -->
  <form (ngSubmit)="applyFilters()" class="flex flex-wrap gap-4 items-end">
    <div class="flex flex-col">
      <label class="text-sm font-medium mb-1">Filter by Field</label>
      <input
        type="text"
        [(ngModel)]="filters.field"
        name="field"
        placeholder="Enter field name"
        class="border rounded px-3 py-2"
      />
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-medium mb-1">Minimum Cost</label>
      <input
        type="number"
        [(ngModel)]="filters.minCost"
        name="minCost"
        class="border rounded px-3 py-2"
      />
    </div>

    <button type="submit" class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold">
      Apply
    </button>

  </form>

  

  <!-- Data Table -->
  <div id="print-section">
    <table class="w-full border border-collapse mt-4">
      <thead>
        <tr class="bg-gray-100">
          <th class="border px-4 py-2">Field</th>
          <th class="border px-4 py-2">Cost</th>
          <th class="border px-4 py-2">Productivity (kg)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredData">
          <td class="border px-4 py-2">{{ item.field }}</td>
          <td class="border px-4 py-2">Rs {{ item.cost }}</td>
          <td class="border px-4 py-2">{{ item.productivity }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
