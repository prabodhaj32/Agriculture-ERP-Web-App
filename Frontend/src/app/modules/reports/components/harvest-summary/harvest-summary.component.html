<h3 class="text-foreground font-semibold mb-4">Harvest Summary</h3>

<div class="p-6 rounded shadow">
  

  <div class="grid grid-cols-3 gap-4 mb-6">
    <input type="date" [(ngModel)]="filters.dateFrom" (ngModelChange)="onFiltersChange()" class="border p-2 rounded" placeholder="From Date" />
   
    <input type="text" [(ngModel)]="filters.field" (ngModelChange)="onFiltersChange()" class="border p-2 rounded" placeholder="Field" />
    <input type="text" [(ngModel)]="filters.worker" (ngModelChange)="onFiltersChange()" class="border p-2 rounded" placeholder="Worker" />
    <input type="text" [(ngModel)]="filters.cropType" (ngModelChange)="onFiltersChange()" class="border p-2 rounded" placeholder="Crop Type" />
    <input type="text" [(ngModel)]="filters.costType" (ngModelChange)="onFiltersChange()" class="border p-2 rounded" placeholder="Cost Type" />
  </div>

     <table mat-table [dataSource]="filteredData" class="mat-elevation-z8 w-full">

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let item">{{ item.date }}</td>
    </ng-container>

    <ng-container matColumnDef="field">
      <th mat-header-cell *matHeaderCellDef>Field</th>
      <td mat-cell *matCellDef="let item">{{ item.field }}</td>
    </ng-container>

    <ng-container matColumnDef="worker">
      <th mat-header-cell *matHeaderCellDef>Worker</th>
      <td mat-cell *matCellDef="let item">{{ item.worker }}</td>
    </ng-container>

    <ng-container matColumnDef="crop">
      <th mat-header-cell *matHeaderCellDef>Crop</th>
      <td mat-cell *matCellDef="let item">{{ item.crop }}</td>
    </ng-container>

    <ng-container matColumnDef="costType">
      <th mat-header-cell *matHeaderCellDef>Cost Type</th>
      <td mat-cell *matCellDef="let item">{{ item.costType }}</td>
    </ng-container>

    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Quantity</th>
      <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
