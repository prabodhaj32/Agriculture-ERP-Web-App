<div class="p-6 bg-white shadow rounded max-w-6xl mx-auto mt-6">
  <h2 class="text-xl font-bold mb-4">Daily Task Summary</h2>

  <!-- 📅 Date Filter -->
  <div class="mb-4">
    <label class="mr-2">Filter by Date:</label>
    <input type="date" [(ngModel)]="filterDate" (change)="filterTasks()" />
    <button class="ml-2 btn-secondary" (click)="filterDate=''; filterTasks()">Clear</button>
  </div>

  <table class="table-auto w-full text-left border">
    <thead>
      <tr class="bg-gray-200">
        <th class="px-4 py-2">Date</th>
        <th class="px-4 py-2">Field</th>
        <th class="px-4 py-2">Task Type</th>
        <th class="px-4 py-2">Worker</th>
        <th class="px-4 py-2">Duration</th>
        <th class="px-4 py-2">Remarks</th>
        <th class="px-4 py-2">Photos</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let task of filteredTasks">
        <td class="border px-4 py-2">{{ task.date }}</td>
        <td class="border px-4 py-2">{{ task.field }}</td>
        <td class="border px-4 py-2">{{ task.taskType }}</td>
        <td class="border px-4 py-2">{{ task.workerName }}</td>
        <td class="border px-4 py-2">{{ task.duration }}h</td>
        <td class="border px-4 py-2">{{ task.remarks }}</td>
        <td class="border px-4 py-2">
          <div class="flex gap-2 flex-wrap">
            <img *ngFor="let img of task.photos" [src]="img" class="w-16 h-16 object-cover rounded border" />
          </div>
        </td>
      </tr>
    </tbody>
  </table>

 <div class="mt-4 flex gap-4">
  <button mat-raised-button color="primary" (click)="exportReport()">Export to CSV</button>
  <button mat-raised-button color="warn" (click)="clearAll()">Clear All</button>
</div>
</div>
