<div class=" bg-white border border-gray-200 rounded-lg p-8">

  <h3 class="text-foreground font-semibold mb-4">Fertilizer / Pesticide Application</h3>


  
  <form (ngSubmit)="submit()" #applicationForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Field -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Field</label>
      <input
        type="text"
        name="field"
        [(ngModel)]="entry.field"
        required
        placeholder="Field"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Date -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
      <input
        type="date"
        name="date"
        [(ngModel)]="entry.date"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Item -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Item</label>
      <input
        type="text"
        name="item"
        [(ngModel)]="entry.item"
        required
        placeholder="Item (e.g., Urea)"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Quantity Applied -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
      <input
        type="number"
        name="quantityApplied"
        [(ngModel)]="entry.quantityApplied"
        required
        min="0"
        placeholder="Quantity (kg)"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Applied By -->
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Applied By</label>
      <input
        type="text"
        name="appliedBy"
        [(ngModel)]="entry.appliedBy"
        required
        placeholder="Applied By"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Buttons -->
    <div class="md:col-span-2 flex justify-end space-x-2">
  <button
    type="button"
    class="bg-muted text-muted-foreground hover:text-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
    (click)="close()"
  >
    Cancel
  </button>
  <button
    type="submit"
    class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
  >
    Submit
  </button>
</div>
  </form>
</div>
