<!-- Title + Button Row -->
<div class="flex items-center justify-between mb-6 mt-8">
  <h3 class="text-foreground font-semibold">Inventory Management Form</h3>
  <button
    (click)="addItem()"
    class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
  >
    Add Item
  </button>
</div>

<!-- Form Card -->
<div class="p-6 bg-white rounded-md shadow-md mx-auto w-full ">
  <form class="grid gap-4 md:grid-cols-2 w-full">
    <input
      class="border rounded px-4 py-2 w-full"
      placeholder="Item Name"
      [(ngModel)]="item.name"
      name="name"
      required
    />
    <select
      class="border rounded px-4 py-2 w-full"
      [(ngModel)]="item.type"
      name="type"
      required
    >
      <option value="">Select Type</option>
      <option value="Fertilizer">Fertilizer</option>
      <option value="Pesticide">Pesticide</option>
    </select>
    <input
      class="border rounded px-4 py-2 w-full"
      placeholder="Brand"
      [(ngModel)]="item.brand"
      name="brand"
      required
    />
    <input
      type="number"
      class="border rounded px-4 py-2 w-full"
      placeholder="Quantity"
      [(ngModel)]="item.quantity"
      name="quantity"
      required
    />
    <input
      type="number"
      class="border rounded px-4 py-2 w-full md:col-span-2"
      placeholder="Unit Cost"
      [(ngModel)]="item.unitCost"
      name="unitCost"
      required
    />
  </form>

  <!-- Low Stock Alert -->
  <div
    *ngIf="lowStockItems.length > 0"
    class="bg-red-100 text-red-800 p-4 rounded mt-8 border border-red-300"
  >
    <h3 class="font-bold text-lg mb-2">⚠️ Low Stock Alert</h3>
    <ul class="list-disc ml-6 text-sm">
      <li *ngFor="let item of lowStockItems">
        {{ item.name }} — Only {{ item.quantity }} left!
      </li>
    </ul>
  </div>
</div>
