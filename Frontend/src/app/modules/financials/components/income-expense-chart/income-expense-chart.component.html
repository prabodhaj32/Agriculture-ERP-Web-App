<div class="p-6 bg-white shadow rounded max-w-4xl mx-auto">
  <h2 class="text-2xl font-bold text-gray-800 mb-6"> Monthly Income & Expense Summary</h2>

  <table class="table-auto w-full border-collapse border border-gray-300">
    <thead class="bg-gray-100">
      <tr>
        <th class="border border-gray-300 px-6 py-3 text-left text-sm font-semibold text-gray-700">Month</th>
        <th class="border border-gray-300 px-6 py-3 text-left text-sm font-semibold text-green-700">Income (Rs.)</th>
        <th class="border border-gray-300 px-6 py-3 text-left text-sm font-semibold text-red-700">Expense (Rs.)</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let month of chartData.income | keyvalue" class="hover:bg-gray-50">
        <td class="border border-gray-300 px-6 py-2">{{ month.key }}</td>
        <td class="border border-gray-300 px-6 py-2 text-green-700 font-medium">
          {{ chartData.income[month.key] || 0 | number:'1.0-2' }}
        </td>
        <td class="border border-gray-300 px-6 py-2 text-red-600 font-medium">
          {{ chartData.expense[month.key] || 0 | number:'1.0-2' }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
