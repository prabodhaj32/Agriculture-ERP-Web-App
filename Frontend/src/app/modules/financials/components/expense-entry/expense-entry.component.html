<form (ngSubmit)="submitExpense()" class="bg-white shadow-md rounded p-6 space-y-4 max-w-xl mx-auto">
  <h2 class="text-2xl font-bold text-gray-800 mb-4"> Record Expense</h2>

  <!-- Expense Type -->
  <div>
    <label for="type" class="block font-medium text-gray-700 mb-1">Expense Type</label>
    <input
      [(ngModel)]="expense.type"
      name="type"
      id="type"
      placeholder="e.g., Fertilizer"
      required
      class="w-full border border-gray-300 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Date -->
  <div>
    <label for="date" class="block font-medium text-gray-700 mb-1">Date</label>
    <input
      [(ngModel)]="expense.date"
      name="date"
      id="date"
      type="date"
      required
      class="w-full border border-gray-300 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Field -->
  <div>
    <label for="field" class="block font-medium text-gray-700 mb-1">Field</label>
    <input
      [(ngModel)]="expense.field"
      name="field"
      id="field"
      placeholder="e.g., Field A"
      required
      class="w-full border border-gray-300 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Amount -->
  <div>
    <label for="amount" class="block font-medium text-gray-700 mb-1">Amount (Rs.)</label>
    <input
      [(ngModel)]="expense.amount"
      name="amount"
      id="amount"
      type="number"
      placeholder="e.g., 5000"
      required
      class="w-full border border-gray-300 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Description -->
  <div>
    <label for="description" class="block font-medium text-gray-700 mb-1">Description</label>
    <textarea
      [(ngModel)]="expense.description"
      name="description"
      id="description"
      placeholder="Optional notes..."
      rows="3"
      class="w-full border border-gray-300 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
    ></textarea>
  </div>

  <!-- Submit Button -->
  <div>
    <button
      type="submit"
      class="w-full bg-green-600 text-white py-2 rounded hover:bg-blue-700 transition"
    >
      Submit Expense
    </button>
  </div>
</form>
