<div class=" bg-white border border-gray-200 rounded-lg  p-8">
  <h2 class="text-2xl font-semibold  mb-6">Harvest Entry</h2>
  
  <form (ngSubmit)="save()" #harvestForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Field -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Field</label>
      <input
        type="text"
        name="field"
        [(ngModel)]="entry.field"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Date -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
      <input
        type="date"
        name="date"
        [(ngModel)]="entry.date"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Worker Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Worker Name</label>
      <input
        type="text"
        name="workerName"
        [(ngModel)]="entry.workerName"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Quantity -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
      <input
        type="number"
        name="quantity"
        [(ngModel)]="entry.quantity"
        required
        min="0"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <!-- Quality Grade -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Quality Grade</label>
      <select
        name="qualityGrade"
        [(ngModel)]="entry.qualityGrade"
        required
        class="w-full px-4 py-2 border border-gray-300 bg-white rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      >
        <option value="" disabled>Select Grade</option>
        <option>Grade A</option>
        <option>Grade B</option>
        <option>Grade C</option>
      </select>
    </div>

    <!-- Transport Details -->
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Transport Details</label>
      <textarea
        name="transportDetails"
        [(ngModel)]="entry.transportDetails"
        rows="4"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none"
      ></textarea>
    </div>

    <!-- Submit Button -->
    <div class="md:col-span-2 text-right">
      <button
        type="submit"
        class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2 rounded-md transition"
      >
        Save Entry
      </button>
    </div>
    
  </form>
</div>
