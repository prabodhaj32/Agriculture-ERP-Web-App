<div class="p-6 max-w-2xl mx-auto bg-white shadow-md rounded-md">
  <h2 class="text-2xl font-semibold mb-6 text-green-700">Harvest Entry Form</h2>
  <form (ngSubmit)="save()" #harvestForm="ngForm" class="space-y-4">

    <div>
      <label class="block mb-1 font-medium">Field</label>
      <input type="text" name="field" [(ngModel)]="entry.field" class="w-full border rounded px-4 py-2" required>
    </div>

    <div>
      <label class="block mb-1 font-medium">Date</label>
      <input type="date" name="date" [(ngModel)]="entry.date" class="w-full border rounded px-4 py-2" required>
    </div>

    <div>
      <label class="block mb-1 font-medium">Worker Name</label>
      <input type="text" name="workerName" [(ngModel)]="entry.workerName" class="w-full border rounded px-4 py-2" required>
    </div>

    <div>
      <label class="block mb-1 font-medium">Quantity (kg)</label>
      <input type="number" name="quantity" [(ngModel)]="entry.quantity" class="w-full border rounded px-4 py-2" required>
    </div>

    <div>
      <label class="block mb-1 font-medium">Quality Grade</label>
      <select name="qualityGrade" [(ngModel)]="entry.qualityGrade" class="w-full border rounded px-4 py-2" required>
        <option value="" disabled>Select Grade</option>
        <option>Grade A</option>
        <option>Grade B</option>
        <option>Grade C</option>
      </select>
    </div>

    <div>
      <label class="block mb-1 font-medium">Transport Details</label>
      <textarea name="transportDetails" [(ngModel)]="entry.transportDetails" rows="3" class="w-full border rounded px-4 py-2"></textarea>
    </div>

    <div class="pt-4">
      <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Submit</button>
    </div>
  </form>
</div>
