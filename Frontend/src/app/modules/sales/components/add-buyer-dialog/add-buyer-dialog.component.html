<div class="bg-white border border-gray-200 rounded-lg p-8 ">
 
  <h3 class="text-foreground font-semibold mb-4">Add New Buyer</h3>


  <form (ngSubmit)="submit()" #buyerForm="ngForm" class="grid grid-cols-1 gap-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" [(ngModel)]="newBuyer.name" required
             class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" [(ngModel)]="newBuyer.email" required
             class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
      <input type="text" name="phone" [(ngModel)]="newBuyer.phone" required
             class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>

    <div class="flex justify-end space-x-2 mt-4">
      <button type="button"
              class="bg-muted text-muted-foreground hover:text-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
              (click)="close()">Cancel</button>
      <button type="submit"
              class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
              [disabled]="buyerForm.invalid">Submit</button>
    </div>
  </form>
</div>
