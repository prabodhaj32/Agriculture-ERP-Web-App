
 

<form (ngSubmit)="submitSale()" class="space-y-4 max-w-xl mx-auto bg-white p-6 rounded shadow">
  
   <h2 class="text-lg font-bold mb-4">New Sale</h2>


  <!-- Buyer -->
  <div>
    <label class="block font-medium mb-1">Select Buyer</label>
    <select [(ngModel)]="sale.buyer" name="buyer" class="input w-full p-2 border rounded" required>
      <option value="" disabled selected>Select a buyer</option>
      <option *ngFor="let b of buyers" [value]="b.name">{{ b.name }}</option>
    </select>
  </div>

  <!-- Item (Dropdown) -->
  <div>
    <label class="block font-medium mb-1">Select Item</label>
    <select [(ngModel)]="sale.item" name="item" class="input w-full p-2 border rounded" required>
      <option value="" disabled selected>Select an item</option>
      <option *ngFor="let i of items" [value]="i">{{ i }}</option>
    </select>
  </div>

  <!-- Quantity -->
  <div>
    <label class="block font-medium mb-1">Quantity</label>
    <input
      [(ngModel)]="sale.quantity"
      name="quantity"
      type="number"
      (input)="calculateTotal()"
      class="input w-full p-2 border rounded"
      placeholder="Enter quantity"
      required
      min="1"
    />
  </div>

  <!-- Unit Price -->
  <div>
    <label class="block font-medium mb-1">Unit Price</label>
    <input
      [(ngModel)]="sale.unitPrice"
      name="unitPrice"
      type="number"
      (input)="calculateTotal()"
      class="input w-full p-2 border rounded"
      placeholder="Enter unit price"
      required
      min="0"
    />
  </div>

  <!-- Total -->
  <div>
    <label class="block font-medium mb-1">Total</label>
    <input
      [(ngModel)]="sale.total"
      name="total"
      class="input w-full p-2 border rounded bg-gray-100"
      placeholder="Total will be calculated"
      readonly
    />
  </div>

  <!-- Amount Paid -->
  <div>
    <label class="block font-medium mb-1">Amount Paid</label>
    <input
      [(ngModel)]="sale.amountPaid"
      name="amountPaid"
      type="number"
      class="input w-full p-2 border rounded"
      placeholder="Enter amount paid"
      required
      min="0"
    />
  </div>

  <!-- Delivery Date -->
  <div>
    <label class="block font-medium mb-1">Delivery Date</label>
    <input
      [(ngModel)]="sale.deliveryDate"
      name="deliveryDate"
      type="date"
      class="input w-full p-2 border rounded"
      required
    />
  </div>

  <!-- Submit Button -->
  <div class="text-right">
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      Submit Sale
    </button>
  </div>

</form>
